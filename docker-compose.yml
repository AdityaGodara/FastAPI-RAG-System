services:
  api:
    build: .
    container_name: rag_sys_api
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped

  celery:
    build: .
    container_name: rag_sys_celery
    command: uv run celery -A app.celery_app.celery worker --loglevel=info --pool=solo
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped
  postgres:
    image: pgvector/pgvector:pg17
    container_name: rag_sys_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fastapi_rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7.2.0
    container_name: rag_sys_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: rag_sys_minio
    env_file:
      - .env
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data: