services:
  postgres:
    image: postgres:15.3
    container_name: rag_sys_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fastapi_rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7.2.0
    container_name: rag_sys_redis
    ports:
      - "6379:6379"

  # minio:
